name: Deploy wiki to production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 2299 crointhemorning.com >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/deploy_key -p 2299 \
            -o StrictHostKeyChecking=accept-new \
            crointhe@crointhemorning.com \
            'set -e
             cd /home/crointhe/repositories/wiki
             git fetch origin main
             git pull --ff-only origin main
             bash /home/crointhe/repositories/wiki/scripts/deploy.sh'

      - name: Verify deploy marker matches commit
        run: |
          EXPECTED_SHA="${{ github.sha }}"
          DEPLOY_SHA=$(ssh -i ~/.ssh/deploy_key -p 2299 \
            -o StrictHostKeyChecking=accept-new \
            crointhe@crointhemorning.com \
            'cat /home/crointhe/public_html/w/.deploy-last-commit')
          echo "Expected: $EXPECTED_SHA"
          echo "Deployed: $DEPLOY_SHA"
          if [ "$DEPLOY_SHA" != "$EXPECTED_SHA" ]; then
            echo "ERROR: deploy marker does not match commit SHA"
            exit 1
          fi
          echo "OK: deploy confirmed in /w"
